taxonomy_id: normalizer_taxonomy.master
taxonomy_version: 2026-03-28.v6
status: draft
defaults:
  fallback_document_type: other
  fallback_category: other
  fallback_subcategory: other
  fallback_field_code: other
  fallback_row_type: other
  fallback_cell_code: other
governance:
  code_policy:
    format: snake_case
    character_set: ascii
    rename_strategy: forbidden
    deprecation_strategy: mark_only
  review_rules:
    require_description: true
    require_domain_assignment: true
    require_fallback_code: true
compatibility:
  taxonomy_contract: semantic_release_v1
  backward_compatible_with:
  - '1.0'
  notes:
  - v1 Master-Taxonomien werden additiv zu semantic_release_v1 erweitert.
  - Projection-Dateien bleiben include-list-kompatibel und koennen schrittweise Semantikmetadaten
    erhalten.
promotion_slots:
- slot: document_title
  label: Document Title
  description: Human-readable document title or subject when available.
  value_type: string
  scope: document
  cardinality: single
  query_role: primary
  display_rank: 10
- slot: primary_party
  label: Primary Party
  description: Main organization, authority, sender, issuer or counterparty anchoring the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: primary
  display_rank: 20
- slot: recipient_party
  label: Recipient Party
  description: Recipient, addressee or target party named by the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: secondary
  display_rank: 30
- slot: person_name
  label: Person Name
  description: Main natural person, patient, member, employee or profile subject.
  value_type: string
  scope: document
  cardinality: single
  query_role: primary
  display_rank: 40
- slot: document_identifier
  label: Document Identifier
  description: Stable document, account, invoice, contract, membership, asset or customer identifier.
  value_type: string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 50
- slot: case_identifier
  label: Case Identifier
  description: Case, permit, authority, legal or insurance reference identifier.
  value_type: string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 60
- slot: document_date
  label: Document Date
  description: Primary date printed on or assigned to the document.
  value_type: date_or_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 70
- slot: due_date
  label: Due Date
  description: Payment, response or action due date when available.
  value_type: date_or_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 80
- slot: period_start
  label: Period Start
  description: Start date of the period covered by the document.
  value_type: date_or_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 90
- slot: period_end
  label: Period End
  description: End date of the period covered by the document.
  value_type: date_or_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 100
- slot: total_amount
  label: Total Amount
  description: Total, gross or payable monetary amount selected for document-level search and filtering.
  value_type: number_or_money_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 110
- slot: balance_amount
  label: Balance Amount
  description: Remaining balance or outstanding amount when available.
  value_type: number_or_money_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 120
- slot: property_address
  label: Property Address
  description: Property, residence, site or real-estate address anchoring the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: display
  display_rank: 130
- slot: site_name
  label: Site Name
  description: Technical, operational or business site name anchoring the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: display
  display_rank: 140
- slot: event_name
  label: Event Name
  description: Community, personal, schedule or narrative event named by the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: display
  display_rank: 150
- slot: appointment_date
  label: Appointment Date
  description: Health, personal, coaching, pastoral or community appointment date.
  value_type: date_or_string
  scope: document
  cardinality: single
  query_role: filter
  display_rank: 160
- slot: provider_name
  label: Provider Name
  description: Service, health, coaching, care or support provider named by the document.
  value_type: string
  scope: document
  cardinality: single
  query_role: secondary
  display_rank: 170
- slot: tenant_name
  label: Tenant Name
  description: Tenant or primary resident named by a housing or property document.
  value_type: string
  scope: document
  cardinality: single
  query_role: secondary
  display_rank: 180
