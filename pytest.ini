[pytest]
addopts = --import-mode=importlib
norecursedirs =
    .venv
    venv
    .pytest_cache
    .pytest-*
    .pytest-tmp
    .pytest-tmp*
    .pytest-basetemp*
    .tmp
    __pycache__
    wheelhouse
    node_modules
    output
    state
    runtime
    dist
    build
    vendor
markers =
    stress: repeated or heavier concurrency checks that are excluded from some default suite runs
